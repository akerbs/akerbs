  <style>
    .d { display:block } .l { display:none }
    @media(prefers-color-scheme:light){ .d { display:none } .l { display:block } }
    @keyframes f{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
    @keyframes b{0%,50%{opacity:1}51%,100%{opacity:0}}
    @keyframes a{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}
    .fl{animation:f 4s ease-in-out infinite}
    .bl{animation:b 1s step-end infinite}
    .s1{animation:a .6s ease-out forwards;opacity:0;animation-delay:.3s}
    .s2{animation:a .6s ease-out forwards;opacity:0;animation-delay:.8s}
    .s3{animation:a .6s ease-out forwards;opacity:0;animation-delay:1.3s}
    .s4{animation:a .6s ease-out forwards;opacity:0;animation-delay:1.8s}
    .s5{animation:a .5s ease-out forwards;opacity:0;animation-delay:2.3s}
    .s6{animation:a .5s ease-out forwards;opacity:0;animation-delay:2.7s}
    .s7{animation:a .5s ease-out forwards;opacity:0;animation-delay:3.1s}
    .s8{animation:a .5s ease-out forwards;opacity:0;animation-delay:3.5s}
    .s9{animation:a .5s ease-out forwards;opacity:0;animation-delay:3.9s}
    .p{animation:pulse 3s ease-in-out infinite}
  </style>
